name: 自动构建并推回 IPK 到仓库

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 拉取最新代码
        uses: actions/checkout@v4
        with:
          # 必须加这个权限，否则 Actions 没法把文件写回仓库
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ 组装并清洗换行符 (防 126 错误)
        run: |
          mkdir -p ipk/CONTROL ipk/usr
          cp -r ipk_build/CONTROL/* ipk/CONTROL/
          cp -r ipk_build/usr/* ipk/usr/
          
          sed -i 's/\r$//' ipk/CONTROL/postinst || true
          chmod 755 ipk/CONTROL/postinst || true

      - name: 📦 终极缝合打包 (ar 命令)
        run: |
          cd ipk
          tar -czf ../control.tar.gz -C CONTROL .
          tar -czf ../data.tar.gz usr
          echo "2.0" > ../debian-binary
          cd ..
          # ✨ 生成最新版 IPK
          ar -crv enigma2-plugin-extensions-githubbouquet_4.0.8_all.ipk debian-binary control.tar.gz data.tar.gz

      - name: 💾 自动把生成的 IPK 提交并推送到代码仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 把新生成的 ipk 强行加入暂存区并提交
          git add enigma2-plugin-extensions-githubbouquet_4.0.8_all.ipk
          git commit -m "🤖 Actions 全自动构建: 更新 4.0.8 IPK 安装包" || echo "没有文件变化，跳过提交"
          git push origin main
