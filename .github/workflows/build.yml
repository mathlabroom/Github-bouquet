name: 自动构建并动态命名推回仓库

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 拉取最新代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ 组装并清洗换行符 (防 126 错误)
        run: |
          mkdir -p ipk/CONTROL ipk/usr
          cp -r ipk_build/CONTROL/* ipk/CONTROL/
          cp -r ipk_build/usr/* ipk/usr/
          
          sed -i 's/\r$//' ipk/CONTROL/postinst || true
          chmod 755 ipk/CONTROL/postinst || true

      - name: 🏷️ 动态提取 control 文件中的真实版本号
        id: get_version
        run: |
          VERSION=$(python3 -c "
          for line in open('ipk_build/CONTROL/control'):
              if line.startswith('Version:'):
                  print(line.split(':')[1].strip())
                  break
          ")
          echo "插件当前版本号为: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 📦 缝合打包并原地推回仓库 (一体化防止路径丢失)
        run: |
          # 1. 记住当前的仓库根目录绝对路径
          REPO_ROOT=$(pwd)
          
          # 2. 进入 ipk 子目录制作压缩包
          cd ipk
          tar -czf ../control.tar.gz -C CONTROL .
          tar -czf ../data.tar.gz usr
          echo "2.0" > ../debian-binary
          
          # 3. 强行回到根目录进行 ar 缝合，确保 .ipk 100% 生成在根目录
          cd $REPO_ROOT
          rm -f enigma2-plugin-extensions-githubbouquet_*.ipk
          ar -crv "enigma2-plugin-extensions-githubbouquet_${{ env.VERSION }}_all.ipk" debian-binary control.tar.gz data.tar.gz
          
          # 4. 顺手把临时打包用的垃圾文件清理干净，保持仓库纯净
          rm -f debian-binary control.tar.gz data.tar.gz
          rm -rf ipk
          
          # 5. 配置 Git 原地提交推回
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 强行把根目录下的新 ipk 喂给 git
          git add "enigma2-plugin-extensions-githubbouquet_${{ env.VERSION }}_all.ipk"
          git commit -m "🤖 Actions 全自动构建: 更新动态版本 ${{ env.VERSION }} IPK 安装包" || echo "没有变化，跳过提交"
          git push origin main
