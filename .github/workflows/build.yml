name: 自动构建并动态命名推回仓库

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 拉取最新代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ 组装并清洗换行符 (防 126 错误)
        run: |
          mkdir -p ipk/CONTROL ipk/usr
          cp -r ipk_build/CONTROL/* ipk/CONTROL/
          cp -r ipk_build/usr/* ipk/usr/
          
          sed -i 's/\r$//' ipk/CONTROL/postinst || true
          chmod 755 ipk/CONTROL/postinst || true

      - name: 🏷️ 动态提取 control 文件中的真实版本号
        id: get_version
        run: |
          # 用 python 自动抓取 Version 行，去掉空格，存入环境变量
          VERSION=$(python3 -c "
          for line in open('ipk_build/CONTROL/control'):
              if line.startswith('Version:'):
                  print(line.split(':')[1].strip())
                  break
          ")
          echo "插件当前版本号为: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 📦 终极缝合打包 (使用动态版本号)
        run: |
          cd ipk
          tar -czf ../control.tar.gz -C CONTROL .
          tar -czf ../data.tar.gz usr
          echo "2.0" > ../debian-binary
          cd ..
          # ✨ 这里的 $VERSION 会自动变成比如 4.0.8 或者 4.0.9
          ar -crv "enigma2-plugin-extensions-githubbouquet_${{ env.VERSION }}_all.ipk" debian-binary control.tar.gz data.tar.gz

      - name: 💾 自动清理旧 IPK 并把新 IPK 推送到代码仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 清理掉仓库根目录下所有旧的 .ipk 文件，防止越攒越多
          rm -f enigma2-plugin-extensions-githubbouquet_*.ipk
          
          # 把刚生成的带精准版本号的 ipk 复制到根目录准备提交
          cp "enigma2-plugin-extensions-githubbouquet_${{ env.VERSION }}_all.ipk" ./
          
          git add enigma2-plugin-extensions-githubbouquet_*.ipk
          git commit -m "🤖 Actions 全自动构建: 更新动态版本 ${{ env.VERSION }} IPK 安装包" || echo "没有变化，跳过提交"
          git push origin main
